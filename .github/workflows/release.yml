name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            name: darwin-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            name: darwin-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            name: linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            name: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: oven-sh/setup-bun@v2

      - name: Build frontend
        working-directory: web
        run: bun install && bun run build

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -ldflags="-s -w" -o git-guider-${{ matrix.name }} ./cmd/server/

      - name: Package
        run: |
          mkdir -p dist
          cp git-guider-${{ matrix.name }} dist/
          cp -r tasks dist/
          cd dist && tar czf ../git-guider-${{ matrix.name }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: git-guider-${{ matrix.name }}
          path: git-guider-${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: '*.tar.gz'
          generate_release_notes: true
